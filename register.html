<!DOCTYPE html>
<html lang="sw">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KaziPro Register</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container">


<h1>
Kazi<span style="color:#FF8A00">
Pro
</span>
</h1>


<h2>
Tengeneza Account
</h2>


<input id="name"
placeholder="Jina lako">


<input id="phone"
placeholder="Namba ya simu">


<input id="email"
placeholder="Email">


<input id="password"
type="password"
placeholder="Password">



<select id="role">


<option value="seeker">
Mtafuta Kazi
</option>


<option value="employer">
Kampuni
</option>


<option value="trainer">
Trainer
</option>


</select>



<button class="btn" onclick="register()">

Register

</button>


<p>
Una account?
<a href="login.html">
Login
</a>
</p>


</div>




<script type="module" src="js/auth.js"></script>


</body>

</html>
